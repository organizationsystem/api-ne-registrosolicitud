openapi: 3.0.0
info:
  title: API-NE-RegistroSolicitud
  description: "Api de registro"
  version: 1.0.0
  x-metadata-api:
    metadataNegocio:
      tribuOwner: Tribu Rock Alternativo
      negocio: Siniestros
      producto: Vida
      dominio: ValidacionSiniestros
      subDominio: ValidacionSiniestrosVida
      productoOwner: Paullette Arce
      squadOwner: The Killers
      arquitecto: Jose Leonardo Canales Barrenechea
      tipoApi: Negocio
      tipoCanal: Canales masivos (autoservicio)
    metadataTecnica:
      tipoExposicion: Interna
      tipoWorkload: microservicio
      lenguajeProgramacion: Java
      nombreServicioBackend: ms-ne-validacionsiniestrosvida
      consumidorApi: GEIX
      codigoAplicacion: GEIX
      mecanismoAutenticacion: ApiKey
servers:
- url: https://virtserver.swaggerhub.com/PacificoSegurosPeru/API-NE-ValidacionSiniestrosVida/1.1.1
  description: SwaggerHub API Auto Mocking
- url: https://virtserver.swaggerhub.com/PacificoSegurosPeru/API-NE-ValidacionSiniestrosVida/1.1.0
  description: SwaggerHub API Auto Mocking
- url: https://server.apim.desa/ne-persona-ejemplo/v1
  description: Servidor de Desarrollo
- url: https://server.apim.certi/ne-persona-ejemplo/v1
